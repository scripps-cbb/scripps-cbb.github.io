# ----------------------------------------------------------------------------
# Site identity — edit these to update site-wide values.
# ----------------------------------------------------------------------------
title: "CBB Hackathon"
tagline: "Computational Biology & Bioinformatics Hackathon"
description: >-
  A computational biology hackathon hosted at Scripps Research, bringing
  together researchers, engineers, and students to build tools for biology.
url: "https://example.github.io"   # production URL (no trailing slash)
baseurl: ""                         # set to "/repo-name" for project pages

# ----------------------------------------------------------------------------
# Event details — surfaced in the hero and on the About page.
# ----------------------------------------------------------------------------
event:
  name: "CBB Hackathon 2026"
  dates: "May 29 – June 1, 2026"
  location: "Scripps Research, La Jolla, California"
  venue: "Beckman Center for Chemical Sciences"
  host: "Scripps Research Computational Biology & Bioinformatics Interest Group"
  cta_label: "Register interest"
  cta_url: "https://luma.com/j1xwjcco"
  contact_email: "hackathon@example.org"

# ----------------------------------------------------------------------------
# Social / external links — leave blank to hide.
# ----------------------------------------------------------------------------
social:
  github: ""
  twitter: ""
  linkedin: ""

# ----------------------------------------------------------------------------
# Build settings — GitHub Pages compatible.
# ----------------------------------------------------------------------------
markdown: kramdown
highlighter: rouge
permalink: /:slug/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# ----------------------------------------------------------------------------
# Collections
#   - sections: homepage section content; each file becomes one anchor block
#               on the single-page home. They don't produce standalone URLs.
#   - projects: per-project detail pages, linked from the Projects section.
# ----------------------------------------------------------------------------
collections:
  sections:
    output: false
  projects:
    output: true
    permalink: /projects/:slug/

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: project

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - README.md
  - .github
