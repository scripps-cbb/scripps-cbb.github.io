<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>

<meta name="description" content="{{ page.description | default: site.description | strip_newlines }}">
<meta name="theme-color" content="#1f2426" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">

<link rel="canonical" href="{{ page.url | absolute_url }}">

<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/scripps-logo.svg' | relative_url }}">

{%- comment -%}
  Resolve theme before the stylesheet loads so the page paints in the
  correct mode on first render (no flash of opposite theme).
{%- endcomment -%}
<script>
  (function () {
    try {
      var saved = localStorage.getItem('cbb-theme');
      var prefers = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (prefers ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  })();
</script>

<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
