<header class="site-header" role="banner">
  <div class="container site-header__inner">
    <a class="site-header__brand" href="{{ '/' | relative_url }}">
      <img class="site-header__brand-mark" src="{{ '/assets/images/scripps-logo.svg' | relative_url }}" alt="" aria-hidden="true">
      <span class="site-header__brand-text">{{ site.title }}</span>
    </a>

    <button class="site-header__toggle" type="button" aria-controls="site-nav" aria-expanded="false" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>

    <nav class="site-nav" id="site-nav" aria-label="Primary">
      <ul class="site-nav__list">
        {% for item in site.data.navigation %}
          <li class="site-nav__item">
            <a class="site-nav__link" href="{{ item.url | relative_url }}">{{ item.title }}</a>
          </li>
        {% endfor %}
      </ul>

      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle light / dark mode">
        <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
      </button>

      {% if site.event.cta_url %}
        <a class="btn btn--accent site-nav__cta btn--with-icon" href="{{ site.event.cta_url }}"><img class="luma-icon" src="{{ '/assets/images/luma-icon.png' | relative_url }}" alt="" aria-hidden="true"><span>{{ site.event.cta_label | default: 'Register' }}</span></a>
      {% endif %}
    </nav>
  </div>
</header>

<script>
  (function () {
    var navToggle = document.querySelector('.site-header__toggle');
    var nav = document.getElementById('site-nav');
    if (navToggle && nav) {
      navToggle.addEventListener('click', function () {
        var open = nav.classList.toggle('is-open');
        navToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
    }

    var themeBtn = document.querySelector('[data-theme-toggle]');
    if (themeBtn) {
      themeBtn.addEventListener('click', function () {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('cbb-theme', next); } catch (e) {}
      });
    }
  })();
</script>
