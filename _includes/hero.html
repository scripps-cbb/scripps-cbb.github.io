<section class="hero">
  <div class="hero__bg" aria-hidden="true"></div>
  <div class="container hero__inner">
    <p class="hero__eyebrow">{{ site.event.host }}</p>
    <h1 class="hero__title">{{ page.hero_title | default: site.event.name }}</h1>
    <p class="hero__subtitle">{{ page.hero_subtitle | default: site.tagline }}</p>

    <dl class="hero__meta">
      <div class="hero__meta-item">
        <dt>Dates</dt>
        <dd>{{ site.event.dates }}</dd>
      </div>
      <div class="hero__meta-item">
        <dt>Location</dt>
        <dd>{{ site.event.location }}</dd>
      </div>
      <div class="hero__meta-item">
        <dt>Venue</dt>
        <dd>{{ site.event.venue }}</dd>
      </div>
    </dl>

    <div class="hero__actions">
      {% if site.event.cta_url %}
        <a class="btn btn--accent btn--lg" href="{{ site.event.cta_url }}">{{ site.event.cta_label }}</a>
      {% endif %}
      <a class="btn btn--ghost btn--lg" href="#about">Learn more</a>
    </div>
  </div>
</section>
